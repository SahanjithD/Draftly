- name: Deploy Draftly App
  hosts: app_servers
  become: yes
  vars:
    app_dir: /home/ubuntu/draftly
    repo_url: https://github.com/SahanjithD/Draftly.git
    repo_branch: main
  tasks:

    - name: Ensure app directory exists
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Sync application repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ repo_branch }}"
        update: yes
        force: yes
      become_user: ubuntu

    - name: Create backend env file from Jenkins secret
      copy:
        content: "{{ lookup('env', 'BACKEND_ENV_CONTENT') | replace('\\r\\n', '\n') | replace('\\n', '\n') }}"
        dest: "{{ app_dir }}/backend/.env"
        owner: ubuntu
        group: ubuntu
        mode: "0600"
      no_log: true

    - name: Validate required backend env keys
      shell: |
        grep -q '^PORT=' "{{ app_dir }}/backend/.env"
        grep -q '^MONGODB_URI=' "{{ app_dir }}/backend/.env"
        grep -q '^JWT_SECRET=' "{{ app_dir }}/backend/.env"

    - name: Pull latest backend and frontend images
      shell: |
        docker compose -f docker-compose.prod.yml pull
      args:
        chdir: "{{ app_dir }}"
      environment:
        IMAGE_TAG: "{{ IMAGE_TAG }}"

    - name: Deploy containers
      shell: |
        docker compose -f docker-compose.prod.yml up -d --force-recreate --no-build
      args:
        chdir: "{{ app_dir }}"
      environment:
        IMAGE_TAG: "{{ IMAGE_TAG }}"

    - name: Clean up dangling images
      shell: docker image prune -f
